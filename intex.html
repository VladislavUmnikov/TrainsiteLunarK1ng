<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e17">
  <title>Живые поезда · MSK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="ambient__orb ambient__orb--1"></div>
    <div class="ambient__orb ambient__orb--2"></div>
    <div class="ambient__grid"></div>
  </div>

  <main class="dashboard">
    <header class="dashboard__header">
      <p class="dashboard__eyebrow">Московское время · UTC+3</p>
      <h1 class="dashboard__title">Расписание поездок</h1>
      <time class="dashboard__clock" id="msk-clock" datetime="">--:--:--</time>
    </header>

    <section class="cards" id="trip-cards" aria-live="polite"></section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
